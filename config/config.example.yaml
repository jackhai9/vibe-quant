# vibe-quant 配置文件示例
# 复制此文件为 config.yaml 并根据需要修改

global:
  testnet: false
  proxy: null   # 代理设置，如 "http://127.0.0.1:7890"，不使用则设为 null
  ws:
    stale_data_ms: 1500
    reconnect:
      initial_delay_ms: 1000
      max_delay_ms: 30000
      multiplier: 2
  # 限速
  rate_limit:
    max_orders_per_sec: 5
    max_cancels_per_sec: 8
  # Telegram
  # 凭证需配置到.env中：TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID
  telegram:
    enabled: false
    events:
      on_fill: true
      on_reconnect: true
      on_risk_trigger: true
      on_open_alert: true
    # Bot 命令接收（/pause、/resume、/status、/help）
    # 要求 telegram.enabled=true 才能生效
    bot:
      enabled: false
      polling_timeout_s: 30
      # 允许的 chat_id 列表，为空时回退使用环境变量 TELEGRAM_CHAT_ID
      allowed_chat_ids: []

  execution:
    order_ttl_ms: 4000
    repost_cooldown_ms: 100
    min_signal_interval_ms: 200
    base_lot_mult: 1

    # maker 定价策略
    # at_touch: 挂在对手价
    # inside_spread_1tick: 挂在对手价内缩 1 tick
    # custom_ticks: 挂在对手价内缩 n tick
    maker_price_mode: "inside_spread_1tick"
    maker_n_ticks: 1
    # post-only maker 安全距离（ticks），越大越不容易 -5022，但更难成交
    maker_safety_ticks: 1

    # 双保险
    max_mult: 100               # 最大加速倍数  final_mult = base_mult * roi_mult * accel_mult，不超过此值
    max_order_notional: 500     # 最大单笔订单名义价值（USDT）

    # 模式轮转（MAKER_ONLY ↔ AGGRESSIVE_LIMIT）
    maker_timeouts_to_escalate: 2
    aggr_fills_to_deescalate: 1
    aggr_timeouts_to_deescalate: 2

    # maker挂单成交率反馈
    fill_rate_feedback_enabled: false
    fill_rate_window_min: 5                # 成交率反馈窗口（分钟）
    fill_rate_low_threshold: 0.25          # <25% 视为低成交率（本轮信号直接切 AGGRESSIVE_LIMIT）
    fill_rate_high_threshold: 0.75         # >75% 视为高成交率（execution.order_ttl_ms + 25%）
    fill_rate_log_windows_min: [1, 5, 15]  # 成交率日志窗口（分钟），为空表示关闭日志

  # 加速倍数
  accel:
    window_ms: 2000       # 2秒窗口
    tiers:                # LONG/SHORT 共用，方向自动处理
      - { ret: 0.001, mult: 2 }    # 窗口涨/跌幅 >= 0.1% 时，mult=2
      - { ret: 0.002, mult: 3 }    # 窗口涨/跌幅 >= 0.2% 时，mult=3
      - { ret: 0.005, mult: 5 }    # 窗口涨/跌幅 >= 0.5% 时，mult=5
      - { ret: 0.01, mult: 10 }    # 窗口涨/跌幅 >= 1.0% 时，mult=10

  # ROI 倍数
  roi:
    tiers:
      - { roi: 0.1, mult: 2 }     # ROI >= 10% 时，mult=2
      - { roi: 0.2, mult: 3 }     # ROI >= 20% 时，mult=3
      - { roi: 0.5, mult: 5 }     # ROI >= 50% 时，mult=5

  # 风控
  risk:
    # 风控等级映射（用于日志展示，可按需调整）
    # - key 是“风险阶段/类型”，value 是等级数字
    # - 例如：想在 2 和 3 之间插入新等级，只需要改这里，不需要改代码里的 log_event
    levels:
      liq_distance_breach: 1
      panic_close: 2
      protective_stop: 3

    # 第一等级：满足触发条件的情况下，距离强平价多少比例时开始 切换到 AGGRESSIVE_LIMIT 模式（更激进的平仓）
    # liq_distance_threshold = abs(mark_price - liquidation_price) / mark_price
    liq_distance_threshold: 0.05

    # 第二等级：不管是否满足触发条件，距离强平价多少比例时开始 按梯度平仓
    # 平仓时先尝试限价，如果超时未成交则使用 AGGRESSIVE_LIMIT
    panic_close:
      enabled: true
      # 超时未成交时间是常规order_ttl_ms的固定比例  TTL = execution.order_ttl_ms × ttl_percent
      ttl_percent: 0.5
      tiers:
        # 梯度，dist_to_liq 越小越危险，按最危险档位执行。
        # dist_to_liq 是距离强平价的比例。slice_ratio 是每次平仓的比例。maker_timeouts_to_escalate 是先尝试限价的次数，超时未成交则使用 AGGRESSIVE_LIMIT
        - { dist_to_liq: 0.04, slice_ratio: 0.02, maker_timeouts_to_escalate: 2 }
        - { dist_to_liq: 0.03, slice_ratio: 0.05, maker_timeouts_to_escalate: 2 }
        - { dist_to_liq: 0.02, slice_ratio: 0.10, maker_timeouts_to_escalate: 2 }

    # 第三等级：仓位保护性止损（交易所端条件单，防程序崩溃/休眠/断网/意外事件等）
    # - 使用 STOP_MARKET + closePosition
    # - workingType=MARK_PRICE（按标记价格触发）
    protective_stop:
      enabled: true
      # dist_to_liq = abs(mark_price - liquidation_price) / mark_price
      dist_to_liq: 0.01
      # C：当爆仓价改善超过阈值时，允许放松保护止损（LONG 下调 / SHORT 上调）
      allow_loosen_on_liq_improve: true
      # 爆仓价改善阈值（比例），如 0.005 = 0.5%
      liq_improve_threshold: 0.005
      # 放松止损冷却时间(s)，防止频繁撤旧建新
      loosen_cooldown_s: 3
      # B：低频全量仓位刷新周期(s)，用于更新 liquidation_price 兜底
      position_refresh_interval_s: 300
      # A：收到保证金相关账户事件后的刷新去抖(s)
      margin_refresh_debounce_s: 2
      # 外部止损接管：当检测到外部 stop/tp（closePosition=true 字段 或 reduceOnly=true 字段）时，本程序停止维护自己的保护止损；并定期用 REST 校验释放锁存（REST 以 raw openOrders 为主）
      external_takeover:
        enabled: true
        rest_verify_interval_s: 30
        max_hold_s: 300

# Symbol 配置（可覆盖 global 中的：execution.*、accel.*、roi.*、risk.*，只要在 symbol 配置中指定了，就会覆盖 global；没指定就用 global 默认值）
symbols:
  # 示例：BTC 永续
  # BTC/USDT:USDT:
  #   execution:
  #     order_ttl_ms: 3000
  #     max_order_notional: 1000

  # 示例：ETH 永续
  # ETH/USDT:USDT:
  #   execution:
  #     max_order_notional: 500
  #
  # 示例：按 symbol 启用盘口量平仓模式
  # DASH/USDT:USDT:
  #   strategy:
  #     mode: orderbook_pressure   # 可选：legacy | orderbook_pressure
  #   pressure_exit:
  #     threshold_qty: 100         # 顶档量阈值：LONG 看 best_bid_qty，SHORT 看 best_ask_qty
  #     sustain_ms: 2000           # 顶档量连续超过阈值至少多久才主动吃单（毫秒）
  #     passive_level: 3           # 主动条件不成立时挂单使用的固定盘口档位（1=一档）
  #     lot_mult: 5                # 固定下单量倍率，实际数量 = min_qty × lot_mult
  #     aggressive_recheck_cooldown_ms: 1000  # 主动单终态后的重检冷却（毫秒）
  #     passive_ttl_ms: 10000      # 被动单 TTL，超时自动撤单（毫秒）
  #
  # 示例：统一缩放 accel 档位倍数（不需要逐档配置）
  # SOL/USDT:USDT:
  #   accel:
  #     mult_percent: 0.5
